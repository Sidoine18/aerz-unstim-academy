<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | AEZ Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1c9e29; --secondary: #191970; --accent: #c41e3a;
            --light: #f4f7f6; --white: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, var(--secondary) 0%, #0a0a3d 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }

        .login-card {
            background: var(--white); padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
            text-align: center; position: relative; overflow: hidden;
        }

        .login-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: var(--primary);
        }

        .logo-admin { height: 80px; margin-bottom: 20px; border-radius: 50%; border: 3px solid var(--light); }

        h2 { color: var(--secondary); margin-bottom: 10px; font-weight: 700; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 40px; color: #aaa; }
        
        label { font-size: 0.85rem; font-weight: 600; color: var(--secondary); margin-bottom: 5px; display: block; }
        
        input {
            width: 100%; padding: 12px 12px 12px 40px; border: 1.5px solid #eee;
            border-radius: 10px; outline: none; transition: 0.3s; font-size: 0.95rem;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(28, 158, 41, 0.1); }

        .btn-login {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }

        .btn-login:hover { background: #158020; transform: translateY(-2px); }

        .error-msg { 
            color: var(--accent); background: #fff1f0; padding: 10px; 
            border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; display: none; 
        }

        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.85rem; }
        .back-link:hover { color: var(--secondary); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="images/logo_aerza.png" alt="Logo" class="logo-admin">
        <h2>Espace Bureau</h2>
        <p>Connectez-vous pour gérer la bibliothèque</p>

        <div id="errorMessage" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Académique</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="admin@aez-unstim.bj" required>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">SE CONNECTER</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au site public</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4NS-Lb0LLn0XXkwtbEKC0IQPtUeof9cs",
            authDomain: "univzou-site.firebaseapp.com",
            projectId: "univzou-site",
            storageBucket: "univzou-site.firebasestorage.app",
            messagingSenderId: "457202134730",
            appId: "1:457202134730:web:d8073a87f7a01be4044e33"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Vérifier si déjà connecté
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "upload.html"; // Redirection automatique
            }
        });

        // Gestion de la connexion
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';
            errorDiv.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // La redirection sera gérée par onAuthStateChanged
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = 'SE CONNECTER';
                errorDiv.style.display = 'block';
                
                // Traduction des erreurs Firebase en français
                switch (error.code) {
                    case 'auth/user-not-found': errorDiv.innerText = "Utilisateur non trouvé."; break;
                    case 'auth/wrong-password': errorDiv.innerText = "Mot de passe incorrect."; break;
                    case 'auth/invalid-email': errorDiv.innerText = "Format d'email invalide."; break;
                    default: errorDiv.innerText = "Erreur de connexion. Vérifiez vos accès.";
                }
            }
        });
    </script>
</body>
</html>
