<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Responsable | AERZA Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1c9e29; --secondary: #191970; --accent: #c41e3a;
            --warning: #f59e0b; --light: #f4f7f6; --white: #ffffff;
            --shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, var(--secondary) 0%, #0a0a3d 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-card {
            background: var(--white); padding: clamp(30px, 5vw, 45px); border-radius: 24px;
            box-shadow: var(--shadow); width: 100%; max-width: 420px;
            text-align: center; position: relative; overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, var(--primary), #2ecc71); }

        .logo-admin { height: 70px; margin-bottom: 20px; transition: transform 0.3s ease; }
        h2 { color: var(--secondary); font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        label { font-size: 0.8rem; font-weight: 700; color: var(--secondary); margin-bottom: 8px; display: block; text-transform: uppercase; }
        .field-wrapper { position: relative; display: flex; align-items: center; }
        .field-wrapper i.main-icon { position: absolute; left: 15px; color: #94a3b8; }

        input {
            width: 100%; padding: 14px 45px 14px 42px; border: 2px solid #e2e8f0;
            border-radius: 12px; outline: none; transition: 0.3s; font-size: 0.95rem; color: var(--secondary);
        }
        input:focus { border-color: var(--primary); background: #f0fdf4; }

        .toggle-password { position: absolute; right: 15px; cursor: pointer; color: #94a3b8; padding: 5px; }

        .btn-login {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 15px; font-size: 1rem;
        }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Styles des messages d'état */
        .status-msg { 
            padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none; 
            animation: fadeIn 0.3s ease;
        }
        .msg-error { color: var(--accent); background: #fff1f2; border: 1px solid #fecaca; }
        .msg-warning { color: #92400e; background: #fffbeb; border: 1px solid #fef3c7; }

        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 25px; color: #64748b; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="images/logo_aerza.png" alt="Logo" class="logo-admin">
        <h2>Espace Responsable</h2>
        <p>Connexion à votre tableau de bord</p>

        <div id="statusMessage" class="status-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Personnel</label>
                <div class="field-wrapper">
                    <i class="fas fa-envelope main-icon"></i>
                    <input type="email" id="email" placeholder="votrenom@email.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <div class="field-wrapper">
                    <i class="fas fa-lock main-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" id="togglePass"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">SE CONNECTER</button>
        </form>

        <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la bibliothèque</a>
        <br>
        <a href="register.html" class="back-link" style="margin-top:10px; color:var(--secondary)">Pas encore de compte ? S'inscrire</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4NS-Lb0LLn0XXkwtbEKC0IQPtUeof9cs",
            authDomain: "univzou-site.firebaseapp.com",
            projectId: "univzou-site"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- UI ELEMENTS ---
        const loginForm = document.getElementById('loginForm');
        const statusDiv = document.getElementById('statusMessage');
        const btn = document.getElementById('loginBtn');
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePass');

        toggleBtn.addEventListener('click', () => {
            const isSecret = passInput.type === 'password';
            passInput.type = isSecret ? 'text' : 'password';
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });

        function showMessage(text, type = 'error') {
            statusDiv.innerText = text;
            statusDiv.className = `status-msg msg-${type}`;
            statusDiv.style.display = 'block';
        }

        // --- LOGIQUE DE CONNEXION ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = passInput.value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Vérification...';
            statusDiv.style.display = 'none';

            try {
                // 1. Authentification Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Vérification du statut dans Firestore
                const userDoc = await getDoc(doc(db, "utilisateurs", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    if (userData.statut === "approuve") {
                        // SUCCÈS : Direction la page d'upload
                        window.location.href = "upload.html";
                    } 
                    else if (userData.statut === "en_attente") {
                        // COMPTE NON ENCORE VALIDÉ
                        await signOut(auth); 
                        showMessage("⏳ Votre compte est en cours de confirmation par l'administration. Merci de patienter.", "warning");
                        btn.disabled = false;
                        btn.innerHTML = 'SE CONNECTER';
                    }
                    else if (userData.statut === "rejete") {
                        // COMPTE REFUSÉ
                        await signOut(auth);
                        showMessage("🚫 Votre demande d'accès a été refusée. Contactez un administrateur.", "error");
                        btn.disabled = false;
                        btn.innerHTML = 'SE CONNECTER';
                    }
                } else {
                    // Utilisateur authentifié mais pas de profil Firestore
                    await signOut(auth);
                    showMessage("Profil utilisateur introuvable.", "error");
                    btn.disabled = false;
                    btn.innerHTML = 'SE CONNECTER';
                }

            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = 'SE CONNECTER';
                
                // Traduction des erreurs techniques
                let msg = "Erreur de connexion. Vérifiez vos accès.";
                if (error.code === 'auth/invalid-credential') msg = "Email ou mot de passe incorrect.";
                if (error.code === 'auth/too-many-requests') msg = "Trop de tentatives. Réessayez plus tard.";
                
                showMessage(msg, "error");
            }
        });
    </script>
</body>
</html>
