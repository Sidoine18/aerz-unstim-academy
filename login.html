<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Responsable | AERZA Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1c9e29; --secondary: #191970; --accent: #c41e3a;
            --light: #f4f7f6; --white: #ffffff;
            --shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, var(--secondary) 0%, #0a0a3d 100%);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--white); 
            padding: clamp(30px, 5vw, 45px); 
            border-radius: 24px;
            box-shadow: var(--shadow); 
            width: 100%; 
            max-width: 420px;
            text-align: center; 
            position: relative; 
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), #2ecc71);
        }

        .logo-admin { 
            height: 70px; 
            margin-bottom: 20px; 
            transition: transform 0.3s ease;
        }
        .logo-admin:hover { transform: scale(1.05); }

        h2 { color: var(--secondary); font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        
        label { 
            font-size: 0.8rem; font-weight: 700; color: var(--secondary); 
            margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px;
        }
        
        .field-wrapper { position: relative; display: flex; align-items: center; }

        .field-wrapper i.main-icon { position: absolute; left: 15px; color: #94a3b8; transition: 0.3s; }

        input {
            width: 100%; padding: 14px 45px 14px 42px; border: 2px solid #e2e8f0;
            border-radius: 12px; outline: none; transition: 0.3s; font-size: 0.95rem;
            color: var(--secondary);
        }

        input:focus { border-color: var(--primary); background: #f0fdf4; }
        input:focus + i.main-icon { color: var(--primary); }

        /* Bouton pour afficher le mot de passe */
        .toggle-password {
            position: absolute; right: 15px; cursor: pointer; color: #94a3b8;
            padding: 5px; transition: 0.3s;
        }
        .toggle-password:hover { color: var(--primary); }

        .btn-login {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-top: 15px; font-size: 1rem;
            box-shadow: 0 4px 12px rgba(28, 158, 41, 0.2);
        }

        .btn-login:hover { background: #158020; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(28, 158, 41, 0.3); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .error-msg { 
            color: var(--accent); background: #fff1f2; padding: 12px; border: 1px solid #fecaca;
            border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; display: none; 
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .back-link { 
            display: inline-flex; align-items: center; gap: 8px; margin-top: 25px; 
            color: #64748b; text-decoration: none; font-size: 0.85rem; font-weight: 500;
        }
        .back-link:hover { color: var(--primary); }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; border-radius: 15px; }
            h2 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="images/logo_aerza.png" alt="Logo" class="logo-admin">
        <h2>Espace Responsable</h2>
        <p>Accès sécurisé AERZA Academy</p>

        <div id="errorMessage" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Personnel</label>
                <div class="field-wrapper">
                    <i class="fas fa-envelope main-icon"></i>
                    <input type="email" id="email" placeholder="admin@gmail.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <div class="field-wrapper">
                    <i class="fas fa-lock main-icon"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" id="togglePass"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">SE CONNECTER</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour au portail</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4NS-Lb0LLn0XXkwtbEKC0IQPtUeof9cs",
            authDomain: "univzou-site.firebaseapp.com",
            projectId: "univzou-site",
            storageBucket: "univzou-site.firebasestorage.app",
            messagingSenderId: "457202134730",
            appId: "1:457202134730:web:d8073a87f7a01be4044e33"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- FONCTIONNALITÉ AFFICHER MOT DE PASSE ---
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePass');

        toggleBtn.addEventListener('click', () => {
            const isSecret = passInput.type === 'password';
            passInput.type = isSecret ? 'text' : 'password';
            toggleBtn.classList.toggle('fa-eye');
            toggleBtn.classList.toggle('fa-eye-slash');
        });

        // --- GESTION ÉTAT CONNEXION ---
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "upload.html";
        });

        // --- SOUMISSION FORMULAIRE ---
        const loginForm = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const btn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authentification...';
            errorDiv.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                btn.disabled = false;
                btn.innerHTML = 'SE CONNECTER';
                errorDiv.style.display = 'block';
                
                console.error("Code erreur:", error.code);
                
                // Traduction ingénierie des erreurs
                switch (error.code) {
                    case 'auth/invalid-credential':
                        errorDiv.innerText = "Email ou mot de passe incorrect.";
                        break;
                    case 'auth/user-not-found':
                        errorDiv.innerText = "Compte responsable inexistant.";
                        break;
                    case 'auth/wrong-password':
                        errorDiv.innerText = "Mot de passe incorrect.";
                        break;
                    case 'auth/too-many-requests':
                        errorDiv.innerText = "Compte bloqué temporairement (trop d'essais).";
                        break;
                    default:
                        errorDiv.innerText = "Erreur système. Vérifiez votre connexion.";
                }
            }
        });
    </script>
</body>
</html>
