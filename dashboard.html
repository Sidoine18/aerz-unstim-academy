<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque UNSTIM | AEZ Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1c9e29; --secondary: #191970; --accent: #c41e3a;
            --light: #f4f7f6; --white: #ffffff; --dark: #212529;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); overflow-x: hidden; }

        header { 
            background: var(--white); padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-area img { height: 45px; }
        .logo-text { font-weight: 800; color: var(--secondary); font-size: 1.3rem; }
        .logo-text span { color: var(--accent); }

        .btn-admin-link {
            background: var(--secondary); color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 8px; font-size: 0.85rem;
            font-weight: 600; transition: 0.3s;
        }
        .btn-admin-link:hover { background: var(--primary); transform: translateY(-2px); }

        .hero-filter { background: var(--secondary); padding: 40px 5%; color: white; text-align: center; }
        .hero-filter h1 { margin-bottom: 25px; font-size: 1.8rem; font-weight: 700; }
        
        .filter-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 12px; max-width: 1100px; margin: 0 auto; 
        }

        select { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            outline: none; font-size: 0.9rem; background: var(--white);
            cursor: pointer; transition: 0.3s;
        }

        .btn-search-trigger { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-search-trigger:hover { background: #158020; letter-spacing: 1px; }

        .main-content { padding: 30px 5%; max-width: 1200px; margin: 0 auto; min-height: 60vh; }
        .results-header { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ddd;
        }
        .results-count { font-weight: 600; color: var(--secondary); }

        #listeEpreuves { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .card-epreuve { 
            background: var(--white); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #eee; transition: 0.3s; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-epreuve:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .card-body { padding: 20px; flex-grow: 1; }
        .card-school { font-size: 0.7rem; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
        .card-title { font-size: 1.05rem; color: var(--secondary); font-weight: 700; margin-bottom: 12px; min-height: 2.6em; }
        
        .card-meta { display: flex; flex-wrap: wrap; gap: 6px; }
        .meta-tag { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; color: #475569; font-weight: 600; }

        .card-footer { background: #f8fafc; padding: 12px; display: flex; gap: 8px; border-top: 1px solid #f1f5f9; }
        .btn-action { 
            flex: 1; text-align: center; text-decoration: none; padding: 10px; border-radius: 6px; 
            font-size: 0.8rem; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-view { background: var(--secondary); color: white; }
        .btn-soluce { background: var(--accent); color: white; }
        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }

        .empty-state { grid-column: 1/-1; text-align: center; padding: 60px; color: #94a3b8; }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-area">
            <img src="images/logo_aerza.png" alt="AEZ">
            <div class="logo-text"><span>A</span>EZ Academy</div>
        </a>
        <a href="upload.html" class="btn-admin-link"><i class="fas fa-plus-circle"></i> Ajouter une épreuve</a>
    </header>

    <section class="hero-filter">
        <div class="container">
            <h1>Rechercher une ressource</h1>
            <div class="filter-grid">
                <select id="f-ecole" onchange="logic_updateFiliere()">
                    <option value="">🏫 Toutes les Écoles</option>
                    <option value="ENSTP">ENSTP (Abomey)</option>
                    <option value="ENSGEP">ENSGEP (Abomey)</option>
                    <option value="ENSGMM">ENSGMM (Abomey)</option>
                    <option value="INSPEI">INSPEI (Abomey)</option>
                    <option value="INSTI">INSTI (Lokossa)</option>
                    <option value="ENSET">ENSET (Lokossa)</option>
                    <option value="ENS">ENS (Natitingou)</option>
                    <option value="FAST">FAST (Natitingou)</option>
                    <option value="ENSBBA">ENSBBA (Dassa)</option>
                </select>

                <select id="f-filiere">
                    <option value="">📚 Toutes les Filières</option>
                </select>

                <select id="f-niveau">
                    <option value="">🎓 Tous Niveaux</option>
                    <option value="L1">Licence 1</option>
                    <option value="L2">Licence 2</option>
                    <option value="L3">Licence 3</option>
                    <option value="Ing1">Ingénieur 1</option>
                    <option value="Ing2">Ingénieur 2</option>
                    <option value="Ing3">Ingénieur 3</option>
                </select>

                <button class="btn-search-trigger" onclick="logic_filtrer()">
                    FILTRER <i class="fas fa-filter" style="margin-left:8px;"></i>
                </button>
            </div>
        </div>
    </section>

    <main class="main-content">
        <div class="results-header">
            <div class="results-count" id="txt-count">Connexion au Cloud...</div>
        </div>
        <div id="listeEpreuves"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4NS-Lb0LLn0XXkwtbEKC0IQPtUeof9cs",
            authDomain: "univzou-site.firebaseapp.com",
            projectId: "univzou-site"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const UNSTIM_DATA = {
            "ENSTP": ["Génie Civil", "Travaux Publics", "Hydraulique / Eau", "Géotechnique"],
            "ENSGEP": ["Génie énergétique et Procédés", "Froid et climatisation", "Equipements motorisées"],
            "ENSGMM": ["Mathématiques appliquées", "Modélisation", "Statistiques / Data"],
            "INSPEI": ["Classes préparatoires"],
            "INSTI": ["Génie industriel", "Maintenance industrielle", "Électrotechnique"],
            "ENSET": ["Sciences techniques industrielles", "Sciences administratives et gestion", "Sciences agricoles", "Sciences biologiques"],
            "ENS": ["MI (Maths-Info)", "PCT (Physique-Chimie)", "SVT"],
            "FAST": ["Mathématiques", "Physique", "Chimie", "Biologie"],
            "ENSBBA": ["Biosciences", "Biotechnologies", "Agroalimentaire"]
        };

        window.logic_updateFiliere = function() {
            const ecole = document.getElementById('f-ecole').value;
            const filiereSelect = document.getElementById('f-filiere');
            filiereSelect.innerHTML = '<option value="">📚 Toutes les Filières</option>';
            
            if(UNSTIM_DATA[ecole]) {
                UNSTIM_DATA[ecole].forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f; opt.innerText = f;
                    filiereSelect.add(opt);
                });
            }
        }

        window.logic_filtrer = async function() {
            const container = document.getElementById('listeEpreuves');
            const txtCount = document.getElementById('txt-count');
            
            const ecole = document.getElementById('f-ecole').value;
            const filiere = document.getElementById('f-filiere').value;
            const niveau = document.getElementById('f-niveau').value;

            container.innerHTML = '<div class="empty-state"><i class="fas fa-circle-notch fa-spin"></i><p>Chargement des épreuves...</p></div>';

            try {
                let q = collection(db, "epreuves");
                let conditions = [];

                if (ecole) conditions.push(where("ecole", "==", ecole));
                if (filiere) conditions.push(where("filiere", "==", filiere));
                if (niveau) conditions.push(where("niveau", "==", niveau));

                let finalQuery;
                if(conditions.length > 0) {
                    finalQuery = query(q, ...conditions);
                } else {
                    finalQuery = query(q, orderBy("date_ajout", "desc"));
                }

                const snap = await getDocs(finalQuery);
                container.innerHTML = "";
                
                let count = 0;
                snap.forEach((doc) => {
                    const d = doc.data();
                    count++;
                    
                    // Nettoyage de l'URL au cas où
                    const pdfLink = encodeURI(d.epreuve_url);

                    container.innerHTML += `
                        <div class="card-epreuve">
                            <div class="card-body">
                                <div class="card-school">${d.ecole}</div>
                                <h3 class="card-title">${d.matiere}</h3>
                                <div class="card-meta">
                                    <span class="meta-tag"><i class="fas fa-graduation-cap"></i> ${d.niveau}</span>
                                    <span class="meta-tag"><i class="fas fa-book"></i> ${d.filiere}</span>
                                    <span class="meta-tag"><i class="far fa-calendar-alt"></i> ${d.annee}</span>
                                </div>
                            </div>
                            <div class="card-footer">
                                <a href="${pdfLink}" 
                                   target="_blank" 
                                   rel="noopener noreferrer" 
                                   referrerpolicy="no-referrer"
                                   class="btn-action btn-view">
                                    <i class="fas fa-file-pdf"></i> Ouvrir PDF
                                </a>
                                ${d.corrige_url ? `
                                <a href="${encodeURI(d.corrige_url)}" 
                                   target="_blank" 
                                   rel="noopener noreferrer" 
                                   referrerpolicy="no-referrer"
                                   class="btn-action btn-soluce">
                                    <i class="fas fa-check"></i> Corrigé
                                </a>` : ''}
                            </div>
                        </div>
                    `;
                });

                txtCount.innerText = `${count} document(s) trouvé(s)`;
                if (count === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>Aucune épreuve trouvée pour ces critères.</p>
                        </div>`;
                }

            } catch (err) {
                console.error(err);
                txtCount.innerText = "Erreur de chargement";
                container.innerHTML = `<div class="empty-state" style="color:var(--accent)">
                    <i class="fas fa-wifi"></i>
                    <p>Impossible de joindre la base de données.</p>
                </div>`;
            }
        }

        window.onload = logic_filtrer;
    </script>
</body>
</html>
