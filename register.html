<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Responsable | AERZA Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #1c9e29; --secondary: #191970; --accent: #c41e3a;
            --light: #f8fafc; --white: #ffffff; --text: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .container {
            background: var(--white); width: 100%; max-width: 750px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden; animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { background: var(--secondary); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--primary); }
        .form-body { padding: 30px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }

        label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--secondary); margin-bottom: 5px; text-transform: uppercase; }
        
        .input-box { position: relative; display: flex; align-items: center; margin-bottom: 15px; }
        .input-box i.prefix { position: absolute; left: 15px; color: #94a3b8; }
        .input-box i.toggle-eye { position: absolute; right: 15px; cursor: pointer; color: #94a3b8; transition: 0.3s; }
        .input-box i.toggle-eye:hover { color: var(--primary); }

        input, select {
            width: 100%; padding: 12px 40px; border: 2px solid #e2e8f0;
            border-radius: 10px; outline: none; transition: 0.3s; font-size: 0.9rem;
        }
        input:focus, select:focus { border-color: var(--primary); background: #fafffa; }

        #statusMsg {
            padding: 12px; border-radius: 10px; margin-bottom: 15px;
            font-size: 0.85rem; font-weight: 600; text-align: center;
            display: none; animation: fadeIn 0.3s;
        }
        .msg-error { background: #fff1f2; color: var(--accent); border: 1px solid #fee2e2; }
        .msg-info { background: #f0f9ff; color: #0369a1; border: 1px solid #e0f2fe; }

        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: 700; cursor: pointer;
            transition: 0.3s; font-size: 1rem;
        }
        .btn-submit:hover { background: #158020; transform: translateY(-2px); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        #successModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            max-width: 450px; animation: scaleUp 0.3s ease;
        }
        @keyframes scaleUp { from { transform: scale(0.8); } to { transform: scale(1); } }
        .modal-content i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        .btn-home { display: inline-block; margin-top: 20px; background: var(--secondary); color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Devenir Responsable</h2>
            <p>Créez votre accès pour gérer la bibliothèque</p>
        </div>

        <div class="form-body">
            <div id="statusMsg"></div>

            <form id="regForm">
                <div class="grid">
                    <div class="input-group">
                        <label>Nom</label>
                        <div class="input-box"><i class="fas fa-user prefix"></i><input type="text" id="nom" placeholder="Ex: AHIZIGBE" required></div>
                    </div>
                    <div class="input-group">
                        <label>Prénoms</label>
                        <div class="input-box"><i class="fas fa-user-tag prefix"></i><input type="text" id="prenom" placeholder="Ex: Sidoine" required></div>
                    </div>
                    
                    <div class="input-group">
                        <label>WhatsApp</label>
                        <div class="input-box"><i class="fab fa-whatsapp prefix"></i><input type="tel" id="whatsapp" placeholder="61000000" required></div>
                    </div>
                    <div class="input-group">
                        <label>Email Académique</label>
                        <div class="input-box"><i class="fas fa-envelope prefix"></i><input type="email" id="email" placeholder="votre@email.com" required></div>
                    </div>

                    <div class="input-group">
                        <label>École / Entité</label>
                        <div class="input-box">
                            <i class="fas fa-university prefix"></i>
                            <select id="entite" onchange="updateFilieres()" required>
                                <option value="">Choisir...</option>                
                                <option value="ENSTP">ENSTP (Abomey)</option>
                                <option value="ENSGEP">ENSGEP (Abomey)</option>
                                <option value="ENSGMM">ENSGMM (Abomey)</option>
                                <option value="INSPEI">INSPEI (Abomey)</option>
                                <option value="INSTI">INSTI (Lokossa)</option>
                                <option value="ENSET">ENSET (Lokossa)</option>
                                <option value="ENS">ENS (Natitingou)</option>
                                <option value="FAST">FAST (Natitingou)</option>
                                <option value="ENSBBA">ENSBBA (Dassa)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Filière</label>
                        <div class="input-box">
                            <i class="fas fa-book prefix"></i>
                            <select id="filiere" required><option value="">D'abord l'école...</option></select>
                        </div>
                    </div>

                    <div class="input-group full">
                        <label>Rôle / Poste</label>
                        <div class="input-box"><i class="fas fa-briefcase prefix"></i><input type="text" id="poste" placeholder="Ex: Délégué de Filière" required></div>
                    </div>

                    <div class="input-group">
                        <label>Mot de passe</label>
                        <div class="input-box">
                            <i class="fas fa-lock prefix"></i>
                            <input type="password" id="pass1" minlength="6" required>
                            <i class="fas fa-eye toggle-eye" onclick="togglePass('pass1', this)"></i>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Confirmer</label>
                        <div class="input-box">
                            <i class="fas fa-check-circle prefix"></i>
                            <input type="password" id="pass2" minlength="6" required>
                            <i class="fas fa-eye toggle-eye" onclick="togglePass('pass2', this)"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">FINALISER L'INSCRIPTION</button>
            </form>
        </div>
    </div>

     <div id="successModal">
        <div class="modal-content">
            <i class="fas fa-paper-plane"></i>
            <h3>Demande Transmise !</h3>
            <p>Votre profil est en cours de validation. Vous recevrez un accès complet dès confirmation par l'administration.</p>
            <a href="index.html" class="btn-home">Retour à l'accueil</a>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4NS-Lb0LLn0XXkwtbEKC0IQPtUeof9cs",
            authDomain: "univzou-site.firebaseapp.com",
            projectId: "univzou-site"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DATA = {
            "ENSTP": ["Génie Civil", "Travaux Publics", "Géotechnique", "Architecture et Urbanisme", "Hydraulique et Assainissement", "Génie Géomatique Appliquée"],
            "ENSGEP": ["Génie énergétique et Procédés", "Froid et climatisation", "Equipements motorisés"],
            "ENSGMM": ["Mathématiques appliquées", "Modélisation", "Statistiques / Data"],
            "INSPEI": ["Sciences et Techniques de l’Ingénieur"],
            "INSTI": ["Génie Mécanique et productique", "Maintenance des Systèmes (Maintenance Automobile)", "Maintenance des Systèmes (Maintenance Industrielle)", "Génie Electrique et Informatique (Electronique et Electrotechnique)", "Génie Electrique et Informatique (Informatique et Télécommunications)", "Génie Energétique (Froid et climatisation)", "Génie Energétique (Energies Renouvelables et Systèmes Energétiques)", "Génie Civile"],
            "ENSET": ["Production végétale", "Production Animale", "Energies Renouvelables", "Électronique", "Froid et Climatisation", "Hôtellerie-Restauration", "Économie Familiale et Sociale", "Fabrication Mécanique", "Mécanique Automobile", "Secrétariat", "Génie Civil", "Electrotechnique", "Économie", "Comptabilité"],
            "ENS": ["Mathématiques et Informatique (MI)", "Physique, Chimie et Technologie (PCT)", "Sciences de la Vie et de la Terre (SVT)"],
            "FAST": ["Mathématiques Informatiques", "Physique Chimie"],
            "ENSBBA": ["Diététique des aliments et Nutrition", "Génie Biologique et Bioprocédés (GBB)", "Génétique Biotechnologies et Applications", "Biotechnologie Pharmaceutique", "Biotechnologie Médicale"]
        };

        window.updateFilieres = function() {
            const entite = document.getElementById('entite').value;
            const filSelect = document.getElementById('filiere');
            filSelect.innerHTML = '<option value="">Choisir la filière...</option>';
            if(DATA[entite]) {
                DATA[entite].forEach(f => {
                    let opt = document.createElement('option');
                    opt.value = f; opt.innerText = f;
                    filSelect.add(opt);
                });
            }
        };

        window.togglePass = function(id, el) {
            const input = document.getElementById(id);
            if(input.type === "password") {
                input.type = "text";
                el.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                el.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };

        function showMsg(text, type = 'error') {
            const box = document.getElementById('statusMsg');
            box.innerText = text;
            box.className = type === 'error' ? 'msg-error' : 'msg-info';
            box.style.display = 'block';
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const msgBox = document.getElementById('statusMsg');
            msgBox.style.display = 'none';

            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if(p1 !== p2) {
                showMsg("Les mots de passe ne sont pas identiques.");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création du compte...';

            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, p1);
                
                await setDoc(doc(db, "utilisateurs", cred.user.uid), {
                    nom: document.getElementById('nom').value.toUpperCase(),
                    prenom: document.getElementById('prenom').value,
                    whatsapp: document.getElementById('whatsapp').value,
                    entite: document.getElementById('entite').value,
                    filiere: document.getElementById('filiere').value,
                    poste: document.getElementById('poste').value,
                    email: document.getElementById('email').value,
                    statut: "en_attente",
                    dateInscription: serverTimestamp()
                });

                // --- DÉCONNEXION POUR FORCER LE PASSAGE PAR LE LOGIN ---
                await signOut(auth);

                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                let errorTxt = "Une erreur est survenue.";
                if(err.code === 'auth/email-already-in-use') errorTxt = "Cet email est déjà utilisé.";
                if(err.code === 'auth/weak-password') errorTxt = "Le mot de passe est trop faible.";
                
                showMsg(errorTxt);
                btn.disabled = false;
                btn.innerText = "FINALISER L'INSCRIPTION";
            }
        });
    </script>
</body>
</html>
